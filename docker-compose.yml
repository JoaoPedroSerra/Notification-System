version: "3.9"

# Credentials are read exclusively from .env — never hardcoded here.
# Copy .env.example to .env and fill in real values before running.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Do NOT expose port 5432 to the host in production.
    # Remove or comment the ports block when deploying to a real environment.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # No --reload in the container image. Use an override file for local dev:
    #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

volumes:
  postgres_data:
