<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}Notificacao{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
    }
    .wrapper {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 16px 40px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .header {
      background: {% block header_bg %}#4f46e5{% endblock %};
      padding: 36px 40px;
      text-align: center;
    }
    .header .logo {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .header .logo span { opacity: .75; }
    .body { padding: 40px 40px 32px; }
    .greeting {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .body p { color: #555; margin-bottom: 16px; }
    .btn-wrap { text-align: center; margin: 28px 0; }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 8px;
      background: {% block btn_bg %}#4f46e5{% endblock %};
      color: #ffffff !important;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: .3px;
    }
    hr { border: none; border-top: 1px solid #eee; margin: 28px 0; }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding: 0 40px;
    }
    .footer a { color: #aaa; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <div class="logo">Notify<span>Hub</span></div>
      </div>
      <div class="body">
        {% block body %}{% endblock %}
      </div>
    </div>
    <div class="footer" style="margin-top:24px;">
      <p>Voce recebeu este email porque esta cadastrado em nossa plataforma.</p>
      <p style="margin-top:6px;">NotifyHub. Todos os direitos reservados.</p>
    </div>
  </div>
</body>
</html>
